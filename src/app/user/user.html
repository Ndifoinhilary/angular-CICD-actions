<div class="text-center">
  <div class="p-4 m-4 bg-amber-50 text-2xl">Example of ngIf and If</div>

  <div>
    <button
      class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
      (click)="isCheck()"
    >
      {{ isChecked ? 'Hide' : 'Show' }}
    </button>

    <div *ngIf="isChecked" class="p-4 m-4 bg-amber-50 text-2xl">Hello World</div>
  </div>

  <input type="text"
   class="border border-gray-400 rounded-md p-2 m-4" [(ngModel)]="number1" />

  <br />

  <input type="text" 
  class="border border-gray-400 rounded-md p-2" [(ngModel)]="number2" />

  <div *ngIf="number1 === number2" class="p-4 m-4 bg-green-50 text-2xl">
    Please enter different numbers
  </div>
</div>
